<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сетка турнира</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <header class="page-header">
      <div>
        <p>Турнир 1 на 1</p>
        <h1>Сетка турнира</h1>
      </div>
      <a class="link-button" href="registration.html">Регистрация</a>
    </header>

    <section class="generator-panel">
      <select id="profileSelect" hidden></select>
      <button id="generateBracketButton" type="button" disabled>Сгенерировать сетку</button>
      <button id="leaveTournamentButton" class="leave-button" type="button" hidden>Выйти из турнира</button>
      <p id="currentIpText">Определяю ваш IP...</p>
      <p id="bracketMessage">Выберите профиль, которому выдали доступ.</p>
    </section>

    <section class="manager-panel">
      <h2>Игроки турнира</h2>
      <ul id="playersControlList"></ul>
    </section>

    <section class="bracket" id="bracket"></section>
  </main>

  <script src="JavaScript.js"></script>
</body>
</html>
